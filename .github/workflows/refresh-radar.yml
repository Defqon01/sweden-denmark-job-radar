name: Refresh Sweden & Denmark Radar

# Regenerates docs/data.json (the public snapshot the website reads) on a
# weekly schedule over a rolling 30-day window ("biggest moves this month"),
# and commits it back so the live site picks it up. Manual runs allowed.
on:
  schedule:
    - cron: "0 6 * * 1"   # 06:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate data.json (collect + export, Haiku-refined)
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --export-json --days 30

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet && echo "No changes." || git commit -m "Update data.json (scheduled refresh)"
          git push
