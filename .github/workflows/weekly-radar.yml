name: Weekly EU Job Market Radar

# Runs every Friday morning (UTC) and on manual trigger.
#
# NOTE ON TIME ZONES: GitHub Actions cron is always in UTC.
#   Friday 08:00 Europe/Stockholm is roughly:
#     - 06:00 UTC in summer (CEST, UTC+2)
#     - 07:00 UTC in winter (CET, UTC+1)
#   We use 06:00 UTC so the email never arrives later than ~08:00 local time.
#   Adjust the cron below if you prefer a different local time.
on:
  schedule:
    - cron: "0 6 * * 5"   # 06:00 UTC every Friday (day-of-week 5 = Friday)
  workflow_dispatch:        # allows manual runs from the Actions tab

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the radar
        env:
          # Email / SMTP secrets (set these in repo Settings -> Secrets and variables -> Actions)
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Optional LLM secrets
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --days 7

      - name: Upload report as artifact
        if: always()  # upload even if the run had warnings
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: reports/*.md
          if-no-files-found: warn
